services:
  shopping-list:
    container_name: shopping-list-logs
    image: ghcr.io/bryanvanwinnendael/shopping-list-logs:${IMAGE_TAG:-latest}
    expose:
      - "3000"
    volumes:
      - ./data:/app/data
    environment:
      ENV: production
      DATA_DIR: /app/data
      LOGS_FILE: logs.txt
      PORT: 3000
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - shopping-list-network
networks:
  shopping-list-network:
    external: true
