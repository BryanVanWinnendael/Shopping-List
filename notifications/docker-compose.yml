services:
  shopping-list:
    container_name: shopping-list-notifications
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8011:3000"
    volumes:
      - ./data:/app/data
    environment:
      ENV: production
      DATA_DIR: /app/data
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - shopping-list-network
networks:
  shopping-list-network:
    name: shopping-list-network
