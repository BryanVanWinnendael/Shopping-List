name: Deploy Category Model µS

on:
  push:
    branches:
      - main
    paths:
      - "category-model/**"
      - "!category-model/README.md"
      - "!category-model/.env.example"
      - "!category-model/.gitignore"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests with coverage
        working-directory: category-model
        run: |
          go test ./handlers ./services \
            -coverpkg=./handlers,./services \
            -coverprofile=coverage.out

      - name: Check coverage threshold (80%)
        working-directory: category-model
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')

          echo "Total coverage: $COVERAGE%"

          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Coverage below 80% threshold"
            exit 1
          fi

          echo "✅ Coverage requirement met"

      - name: Set up SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} > ~/.ssh/known_hosts

      - name: Deploy Category Model
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          cd ~/projects/shopping-list/category-model
          git fetch origin main
          git reset --hard origin/main
          docker compose build
          docker compose up -d
          docker image prune -af
          EOF