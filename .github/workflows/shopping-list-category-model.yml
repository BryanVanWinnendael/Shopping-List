name: Deploy Category Model µS

env:
  VERSION: "1.0.1"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "services/category-model/**"
      - "!services/category-model/README.md"
      - "!services/category-model/.env.example"
      - "!services/category-model/.gitignore"
      - ".github/workflows/shopping-list-category-model.yml"

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests with coverage
        working-directory: services/category-model
        run: |
          go test ./handlers ./services \
            -coverpkg=./handlers,./services \
            -coverprofile=coverage.out

      - name: Check coverage per package (80% rule)
        working-directory: services/category-model
        run: |
          echo "📊 Coverage Report"

          HANDLERS_COV=$(go test ./handlers -cover | grep coverage | awk '{print $5}' | sed 's/%//')
          SERVICES_COV=$(go test ./services -cover | grep coverage | awk '{print $5}' | sed 's/%//')

          echo "--------------------------------"
          echo "Handlers coverage: $HANDLERS_COV%"
          echo "Services coverage: $SERVICES_COV%"
          echo "--------------------------------"

          FAIL=0

          if (( $(echo "$HANDLERS_COV < 80" | bc -l) )); then
            echo "❌ Handlers coverage below 80%"
            FAIL=1
          else
            echo "✅ Handlers coverage OK"
          fi

          if (( $(echo "$SERVICES_COV < 80" | bc -l) )); then
            echo "❌ Services coverage below 80%"
            FAIL=1
          else
            echo "✅ Services coverage OK"
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo "❌ Coverage check failed"
            exit 1
          fi

          echo "All coverage thresholds passed"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Check if version already exists
        id: check
        run: |
          IMAGE="ghcr.io/${OWNER_LC}/shopping-list-category-model:${VERSION}"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "Image $IMAGE already exists, skipping build."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Image $IMAGE does not exist, will build."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip notice
        if: steps.check.outputs.exists == 'true'
        run: |
          echo "::notice::Version ${VERSION} already published — skipping build & deploy. Bump VERSION to release."

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: services
          file: services/category-model/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/shopping-list-category-model:${{ env.VERSION }}
            ghcr.io/${{ env.OWNER_LC }}/shopping-list-category-model:latest

      - name: Set up SSH
        if: steps.check.outputs.exists == 'false'
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} > ~/.ssh/known_hosts

      - name: Deploy Category Model
        if: steps.check.outputs.exists == 'false'
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          cd ~/projects/shopping-list/services
          export IMAGE_TAG=${VERSION}
          docker compose -f category-model/docker-compose.yml pull
          docker compose -f category-model/docker-compose.yml up -d
          docker image prune -f --filter "label=com.docker.compose.project=category-model"
          EOF