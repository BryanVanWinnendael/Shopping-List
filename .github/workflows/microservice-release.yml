name: Microservice Release

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string

      version_bump:
        required: true
        type: string

      custom_version:
        required: false
        type: string

env:
  SERVICE_NAMES: >-
    {
      "api-gateway":"API Gateway",
      "category-model":"Category Model µS",
      "cron":"Cron µS",
      "logs":"Logs µS",
      "notifications":"Notifications µS",
      "products-search":"Products Search µS",
      "recipes":"Recipes µS",
      "storage":"Storage µS"
    }

permissions:
  contents: write
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set DISPLAY_NAME
        run: |
          echo "DISPLAY_NAME=$(echo '${{ env.SERVICE_NAMES }}' | jq -r '."${{ inputs.service }}"')" >> "$GITHUB_ENV"

      - name: Set variables
        run: |
          SERVICE="${{ inputs.service }}"

          echo "SERVICE=$SERVICE" >> "$GITHUB_ENV"
          echo "SERVICE_DIR=services/$SERVICE" >> "$GITHUB_ENV"
          echo "VERSION_FILE=services/$SERVICE/.version" >> "$GITHUB_ENV"

      - name: Run tests with coverage
        working-directory: services/${{ inputs.service }}
        run: |
          go test ./handlers ./services \
            -coverpkg=./handlers,./services \
            -coverprofile=coverage.out

      - name: Check coverage per package (80% rule)
        working-directory: services/${{ inputs.service }}
        run: |
          HANDLERS_COV=$(go test ./handlers -cover | grep coverage | awk '{print $5}' | sed 's/%//')
          SERVICES_COV=$(go test ./services -cover | grep coverage | awk '{print $5}' | sed 's/%//')

          FAIL=0

          if (( $(echo "$HANDLERS_COV < 80" | bc -l) )); then
            FAIL=1
          fi

          if (( $(echo "$SERVICES_COV < 80" | bc -l) )); then
            FAIL=1
          fi

          [ "$FAIL" -eq 0 ] || exit 1

      - name: Determine version
        id: version
        run: |
          PREVIOUS_VERSION=$(cat "$VERSION_FILE")

          IFS='.' read -r MAJOR MINOR PATCH <<< "$PREVIOUS_VERSION"

          case "${{ inputs.version_bump }}" in
            major)
              VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              VERSION="${MAJOR}.$((MINOR + 1)).0"
              ;;
            patch)
              VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
            custom)
              VERSION="${{ inputs.custom_version }}"

              if [ -z "$VERSION" ]; then
                echo "custom_version is required"
                exit 1
              fi
              ;;
            *)
              echo "Invalid version bump"
              exit 1
              ;;
          esac

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "PREVIOUS_VERSION=$PREVIOUS_VERSION" >> "$GITHUB_ENV"

          if [ "$VERSION" = "$PREVIOUS_VERSION" ]; then
            echo "VERSION_CHANGED=false" >> "$GITHUB_ENV"
            echo "Version unchanged: $VERSION"
          else
            echo "$VERSION" > "$VERSION_FILE"
            echo "VERSION_CHANGED=true" >> "$GITHUB_ENV"
            echo "Version changed: $PREVIOUS_VERSION -> $VERSION"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Check if version already exists
        id: check
        run: |
          IMAGE="ghcr.io/${OWNER_LC}/shopping-list-${SERVICE}:${VERSION}"

          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: services
          file: services/${{ inputs.service }}/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/shopping-list-${{ env.SERVICE }}:${{ env.VERSION }}
            ghcr.io/${{ env.OWNER_LC }}/shopping-list-${{ env.SERVICE }}:latest

      - name: Set up SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} > ~/.ssh/known_hosts

      - name: Deploy service
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          cd ~/projects/shopping-list/services

          export IMAGE_TAG=${VERSION}

          docker compose -f ${SERVICE}/docker-compose.yml pull
          docker compose -f ${SERVICE}/docker-compose.yml up -d

          echo "Deployment complete for ${SERVICE} ${VERSION}"
          EOF

      - name: Cleanup previous image
        if: steps.check.outputs.exists == 'false'
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "PREVIOUS_VERSION=${PREVIOUS_VERSION} OWNER_LC=${OWNER_LC} SERVICE=${SERVICE} bash -s" << 'EOF'

          OLD_IMAGE="ghcr.io/${OWNER_LC}/shopping-list-${SERVICE}:${PREVIOUS_VERSION}"

          if [ -n "$PREVIOUS_VERSION" ]; then
            docker image rm "$OLD_IMAGE" || true
          fi
          EOF

      - name: Commit updated version
        if: env.VERSION_CHANGED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$VERSION_FILE"

          git commit \
            -m "[${DISPLAY_NAME} Build]: bump version to ${VERSION}" \
            || true

          git pull --rebase origin ${{ github.ref_name }}

          git push