name: Deploy App Cron

on:
  schedule:
    # Run every 45 days at midnight UTC
    - cron: "0 0 1 */2 *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/shopping-list-app-cron.yml"

jobs:
  deploy:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Increment build number
        run: node app/scripts/next-build.js

      - name: Commit & push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add app.config.js
          git commit -m "[Shopping List CI/CD] bump iOS buildNumber" || echo "No changes to commit"
          git push

      - name: Set up SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} > ~/.ssh/known_hosts

      - name: Deploy App
        run: |
          timeout 120 ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          cd ~/projects/shopping-list/app
          git fetch origin main
          git reset --hard origin/main
          EXPO_TOKEN=${{ secrets.EXPO_TOKEN }} yarn build
          EOF || true