name: Build App

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/shopping-list-app-build.yml"

jobs:
  deploy:
    if: contains(join(github.event.commits.*.message, ' '), 'BUILD')
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Set up SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} > ~/.ssh/known_hosts

      - name: Deploy App
        run: |
          OUTPUT=$(timeout 120 ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"

          cd ~/projects/shopping-list/app
          git fetch origin main
          git reset --hard origin/main
          yarn install
          EXPO_TOKEN=${{ secrets.EXPO_TOKEN }} yarn build
          EOF
          )

          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "Waiting for build to complete."; then
            echo "✅ Build started successfully"
            exit 0
          else
            echo "❌ Build did not reach expected state"
            exit 1
          fi
