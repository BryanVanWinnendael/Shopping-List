name: Deploy Microservice

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Microservice to deploy"
        required: true
        type: choice
        options:
          - api-gateway
          - category-model
          - cron
          - logs
          - notifications
          - products-search
          - recipes
          - storage

      version_bump:
        description: "Version increment type"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - custom

      custom_version:
        description: "Custom version (only used when version_bump=custom)"
        required: false

permissions:
  contents: write
  packages: write

jobs:
  deploy:
    uses: ./.github/workflows/microservice-release.yml
    with:
      service: ${{ inputs.service }}
      version_bump: ${{ inputs.version_bump }}
      custom_version: ${{ inputs.custom_version }}