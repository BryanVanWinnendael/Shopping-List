name: Deploy API Gateway µS

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Docker image version (leave empty to use .version)"
        required: false

  push:
    branches:
      - main
    paths:
      - "services/api-gateway/**"
      - "!services/api-gateway/README.md"
      - "!services/api-gateway/.env.example"
      - "!services/api-gateway/.gitignore"
      - ".github/workflows/shopping-list-api-gateway.yml"
      - "services/api-gateway/.version"

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          PREVIOUS_VERSION=$(cat services/api-gateway/.version)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "$VERSION" > services/api-gateway/.version
            echo "updated=true" >> $GITHUB_OUTPUT
          else
            VERSION="$PREVIOUS_VERSION"
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "PREVIOUS_VERSION=$PREVIOUS_VERSION" >> "$GITHUB_ENV"

          echo "Using version: $VERSION"
          echo "Previous version: $PREVIOUS_VERSION"

      - name: Commit updated version (if changed)
        if: steps.version.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add services/api-gateway/.version
          git commit -m "[API Gateway Release]: bump version to ${VERSION}"
          git push

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Check if version already exists
        id: check
        run: |
          IMAGE="ghcr.io/${OWNER_LC}/shopping-list-api-gateway:${VERSION}"

          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "Image $IMAGE already exists, skipping build."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Image $IMAGE does not exist, will build."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip notice
        if: steps.check.outputs.exists == 'true'
        run: |
          echo "::notice::Version ${VERSION} already published — skipping build & deploy."

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: services
          file: services/api-gateway/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/shopping-list-api-gateway:${{ env.VERSION }}
            ghcr.io/${{ env.OWNER_LC }}/shopping-list-api-gateway:latest

      - name: Set up SSH
        if: steps.check.outputs.exists == 'false'
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} > ~/.ssh/known_hosts

      - name: Deploy API Gateway
        if: steps.check.outputs.exists == 'false'
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          cd ~/projects/shopping-list/services

          export IMAGE_TAG=${VERSION}

          docker compose -f api-gateway/docker-compose.yml pull
          docker compose -f api-gateway/docker-compose.yml up -d

          echo "Deployment complete for version: ${VERSION}"
          EOF

      - name: Cleanup previous image on server
        if: steps.check.outputs.exists == 'false'
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "PREVIOUS_VERSION=${PREVIOUS_VERSION} OWNER_LC=${OWNER_LC} bash -s" << 'EOF'

          OLD_IMAGE="ghcr.io/${OWNER_LC}/shopping-list-api-gateway:${PREVIOUS_VERSION}"

          if [ -n "$PREVIOUS_VERSION" ]; then
            docker image rm "$OLD_IMAGE" || true
          fi
          EOF