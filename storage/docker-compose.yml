services:
  shopping-list:
    container_name: shopping-list-storage
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8010:3000"
    volumes:
      - ./storage:/app/storage
    environment:
      ENV: production
      STORAGE_DIR: /app/storage
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - shopping-list-network
networks:
  shopping-list-network:
    external: true
